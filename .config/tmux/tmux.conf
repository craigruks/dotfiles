# Terminal multiplexer
# https://github.com/tmux/tmux

set-option -g focus-events on # TODO: learn how this works

# colors
set -g default-terminal "tmux-256color"
set -g terminal-overrides ",xterm-256color:RGB"

set -g base-index 1          # start indexing windows at 1 instead of 0
set -g detach-on-destroy off # don't exit from tmux when closing a session
set -g escape-time 0         # zero-out escape time delay
set -g history-limit 1000000 # increase history size (from 2,000)
set -g mouse on              # enable mouse support
set -g renumber-windows on   # renumber all windows when any window is closed
set -g set-clipboard on      # use system clipboard
set -g status-interval 3     # update the status bar every 3 seconds

# --- status bar: complements starship, never duplicates it --------------------
# The shell prompt (starship) owns per-prompt context - cwd, git branch/state,
# languages. So the tmux bar shows ONLY session-level info starship can't:
#   ‚ÄĘ which sesh session you're in      (left)
#   ‚ÄĘ how long that session has been up  (right)
# Git used to live here via gitmux; removed - it just echoed starship's git line.
# One job per tool: the prompt tells you where/what you're editing, the tmux bar
# tells you about the session.

# left: session name, basename only. session_name (#S) is sesh's full path-like
# name (e.g. Download/audio-metadata-scanner); starship's cwd already shows the
# path, so #{b:...} strips to the last segment to avoid the echo.
set -g status-left "#[fg=blue,bold]#{b:session_name} "
set -g status-left-length 200    # increase length (from 10)
set -g status-position top       # macOS / darwin style
# right: session uptime - unique to tmux, starship can't know it. Helper formats
# #{session_created} as 45m / 2h14m. No clock: the macOS menu bar already has one.
set -g status-right "#[fg=gray,nobold]#($HOME/.local/bin/tmux-session-uptime #{session_created}) "
set -g status-style 'bg=default' # transparent

set -g window-status-current-format '*#[fg=magenta]#W'
set -g window-status-format ' #[fg=gray]#W'

set -g default-terminal "${TERM}"
set -g message-command-style bg=default,fg=yellow
set -g message-style bg=default,fg=yellow
set -g mode-style bg=default,fg=yellow
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

bind '%' split-window -c '#{pane_current_path}' -h
bind '"' split-window -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'
bind r source-file ~/.config/tmux/tmux.conf \; display-message "  tmux.conf reloaded"
bind g new-window -n 'ūüĆ≥' lazygit
bind G new-window -n 'ūüėļ' gh dash
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt (cmd+w)
bind-key e send-keys "tmux capture-pane -p -S - | nvim -c 'set buftype=nofile' +" Enter

set -g @tmux-nerd-font-window-name-shell-icon 'ÔĀĒ'
set -g @tmux-nerd-font-window-name-show-name false

# community plugins
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'christoomey/vim-tmux-navigator' # <ctrl>+hjkl

set -g @plugin 'tmux-plugins/tpm'        # load tpm
run "$HOME/.config/tmux/plugins/tpm/tpm" # run tpm (always end of file)

# sesh
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '‚ö°  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(‚ö°  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(ūü™ü  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(‚öôÔłŹ  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(ūüďĀ  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(ūüĒé  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(‚ö°  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""